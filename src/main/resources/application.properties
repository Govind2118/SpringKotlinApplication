server.port=8000

spring.application.name=crypto-quote-service

spring.datasource.url=jdbc:h2:mem:quotesdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

app.cache-ttl=PT2M
app.quote-history-limit=20

info.app.name=Crypto Quote Service
info.app.description=Production-style Spring Boot WebFlux service for cryptocurrency quote retrieval and auditing
info.app.version=1.0.0
springdoc.swagger-ui.path=/swagger-ui.html
